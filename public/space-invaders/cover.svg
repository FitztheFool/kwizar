<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.3" r="0.8">
      <stop offset="0" stop-color="#22c55e" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#22c55e" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <rect width="800" height="450" fill="url(#glow)"/>
  <g fill="#ffffff" opacity="0.6">
    <circle cx="100" cy="60" r="2"/><circle cx="680" cy="50" r="2"/><circle cx="300" cy="40" r="2"/>
    <circle cx="540" cy="90" r="2"/><circle cx="200" cy="100" r="2"/><circle cx="720" cy="120" r="2"/>
  </g>
  <!-- alien glyph -->
  <g fill="#4ade80">
    <g transform="translate(290 110)">
      <rect x="20" y="0" width="20" height="20"/><rect x="60" y="0" width="20" height="20"/>
      <rect x="0" y="20" width="100" height="20"/>
      <rect x="0" y="40" width="20" height="20"/><rect x="40" y="40" width="20" height="20"/><rect x="80" y="40" width="20" height="20"/>
      <rect x="0" y="60" width="20" height="20"/><rect x="80" y="60" width="20" height="20"/>
    </g>
    <g transform="translate(430 110)" fill="#22d3ee">
      <rect x="20" y="0" width="20" height="20"/><rect x="60" y="0" width="20" height="20"/>
      <rect x="0" y="20" width="100" height="20"/>
      <rect x="0" y="40" width="20" height="20"/><rect x="40" y="40" width="20" height="20"/><rect x="80" y="40" width="20" height="20"/>
      <rect x="0" y="60" width="20" height="20"/><rect x="80" y="60" width="20" height="20"/>
    </g>
  </g>
  <!-- ship -->
  <g fill="#fbbf24" transform="translate(370 250)">
    <rect x="28" y="0" width="14" height="20"/>
    <rect x="0" y="20" width="70" height="20" rx="6"/>
  </g>
  <rect x="402" y="220" width="6" height="30" fill="#fde047"/>
  <g transform="translate(400 400)" text-anchor="middle" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
    <text font-size="38" font-weight="800" fill="#ffffff" letter-spacing="3">SPACE INVADERS</text>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7f1d1d"/>
      <stop offset="1" stop-color="#450a0a"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.35" r="0.8">
      <stop offset="0" stop-color="#f87171" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#f87171" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <rect width="800" height="450" fill="url(#glow)"/>
  <g font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-weight="900" font-size="56" text-anchor="middle" fill="#ffffff">
    <!-- row: letters with SUTOM color code (red=well placed, yellow=present) -->
    <rect x="200" y="120" width="80" height="80" rx="10" fill="#dc2626"/>
    <text x="240" y="177">S</text>
    <rect x="290" y="120" width="80" height="80" rx="10" fill="#1c0606"/>
    <text x="330" y="177">U</text>
    <rect x="380" y="120" width="80" height="80" rx="40" fill="#eab308"/>
    <text x="420" y="177">T</text>
    <rect x="470" y="120" width="80" height="80" rx="10" fill="#1c0606"/>
    <text x="510" y="177">O</text>
    <rect x="560" y="120" width="80" height="80" rx="40" fill="#eab308"/>
    <text x="600" y="177">M</text>
  </g>
  <g opacity="0.35">
    <rect x="200" y="215" width="80" height="80" rx="10" fill="#1c0606"/>
    <rect x="290" y="215" width="80" height="80" rx="10" fill="#1c0606"/>
    <rect x="380" y="215" width="80" height="80" rx="10" fill="#1c0606"/>
    <rect x="470" y="215" width="80" height="80" rx="10" fill="#1c0606"/>
    <rect x="560" y="215" width="80" height="80" rx="10" fill="#1c0606"/>
  </g>
  <g transform="translate(400 390)" text-anchor="middle" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
    <text font-size="40" font-weight="800" fill="#ffffff" letter-spacing="6" opacity="0.9">SUTOM</text>
  </g>
</svg>

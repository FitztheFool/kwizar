<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#312e81"/>
      <stop offset="1" stop-color="#1e1b4b"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.3" r="0.8">
      <stop offset="0" stop-color="#a78bfa" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <rect width="800" height="450" fill="url(#glow)"/>
  <g stroke="#1e1b4b" stroke-width="3">
    <!-- I piece (cyan) -->
    <rect x="120" y="90" width="40" height="40" fill="#22d3ee"/>
    <rect x="160" y="90" width="40" height="40" fill="#22d3ee"/>
    <rect x="200" y="90" width="40" height="40" fill="#22d3ee"/>
    <rect x="240" y="90" width="40" height="40" fill="#22d3ee"/>
    <!-- T piece (purple) -->
    <rect x="360" y="80" width="40" height="40" fill="#a855f7"/>
    <rect x="320" y="120" width="40" height="40" fill="#a855f7"/>
    <rect x="360" y="120" width="40" height="40" fill="#a855f7"/>
    <rect x="400" y="120" width="40" height="40" fill="#a855f7"/>
    <!-- L piece (orange) -->
    <rect x="520" y="90" width="40" height="40" fill="#f97316"/>
    <rect x="520" y="130" width="40" height="40" fill="#f97316"/>
    <rect x="520" y="170" width="40" height="40" fill="#f97316"/>
    <rect x="560" y="170" width="40" height="40" fill="#f97316"/>
    <!-- O piece (yellow) -->
    <rect x="260" y="200" width="40" height="40" fill="#eab308"/>
    <rect x="300" y="200" width="40" height="40" fill="#eab308"/>
    <rect x="260" y="240" width="40" height="40" fill="#eab308"/>
    <rect x="300" y="240" width="40" height="40" fill="#eab308"/>
    <!-- S piece (green) -->
    <rect x="420" y="240" width="40" height="40" fill="#22c55e"/>
    <rect x="460" y="240" width="40" height="40" fill="#22c55e"/>
    <rect x="380" y="280" width="40" height="40" fill="#22c55e"/>
    <rect x="420" y="280" width="40" height="40" fill="#22c55e"/>
  </g>
  <g transform="translate(400 400)" text-anchor="middle" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
    <text font-size="44" font-weight="800" fill="#ffffff" letter-spacing="6">TETRIS</text>
  </g>
</svg>

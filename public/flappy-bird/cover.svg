<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#0ea5e9"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.3" cy="0.3" r="0.7">
      <stop offset="0" stop-color="#fef9c3" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#fef9c3" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <rect width="800" height="450" fill="url(#glow)"/>
  <g fill="#ffffff" opacity="0.7">
    <ellipse cx="150" cy="100" rx="50" ry="24"/><ellipse cx="190" cy="90" rx="40" ry="20"/>
    <ellipse cx="620" cy="140" rx="55" ry="26"/><ellipse cx="660" cy="130" rx="40" ry="20"/>
  </g>
  <!-- pipes -->
  <g fill="#16a34a" stroke="#15803d" stroke-width="4">
    <rect x="500" y="0" width="80" height="130"/>
    <rect x="488" y="120" width="104" height="34" rx="6"/>
    <rect x="500" y="300" width="80" height="150"/>
    <rect x="488" y="290" width="104" height="34" rx="6"/>
  </g>
  <!-- bird -->
  <g transform="translate(250 200)">
    <ellipse cx="0" cy="0" rx="44" ry="36" fill="#fde047"/>
    <ellipse cx="-10" cy="6" rx="22" ry="16" fill="#f59e0b"/>
    <circle cx="22" cy="-10" r="10" fill="#ffffff"/>
    <circle cx="25" cy="-10" r="5" fill="#1e293b"/>
    <path d="M40 0 l24 -8 v16 z" fill="#f97316"/>
  </g>
  <rect x="0" y="410" width="800" height="40" fill="#ca8a04"/>
  <g transform="translate(400 385)" text-anchor="middle" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
    <text font-size="42" font-weight="800" fill="#ffffff" letter-spacing="3">FLAPPY BIRD</text>
  </g>
</svg>
